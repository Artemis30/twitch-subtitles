<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwitchSubs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      width: 320px;
      background: #0e0e10;
      color: #efeff1;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #26262c;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9147ff;
    }

    .logo-text {
      font-weight: 600;
      font-size: 14px;
      color: #efeff1;
      letter-spacing: -0.01em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: #1a1a20;
      border: 1px solid #26262c;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #545459;
    }

    .status-dot.active {
      background: #00c472;
    }

    .status-text {
      color: #adadb8;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a20;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #545459;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .row:last-child { margin-bottom: 0; }

    .row-label {
      color: #adadb8;
      font-size: 13px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #3a3a44;
      border-radius: 18px;
      transition: background 0.2s;
    }

    .thumb {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #efeff1;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.2s;
    }

    .toggle input:checked + .track { background: #9147ff; }
    .toggle input:checked ~ .thumb { left: 19px; }

    /* Input fields */
    input[type="text"], input[type="password"], select {
      background: #1a1a20;
      border: 1px solid #26262c;
      border-radius: 6px;
      color: #efeff1;
      font-size: 12px;
      padding: 6px 10px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #9147ff;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #545459;
    }

    select option { background: #1a1a20; }

    /* Range slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #26262c;
      border-radius: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #9147ff;
      cursor: pointer;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-label {
      color: #adadb8;
      font-size: 12px;
      white-space: nowrap;
      min-width: 90px;
    }

    .range-val {
      font-size: 12px;
      color: #efeff1;
      min-width: 28px;
      text-align: right;
    }

    /* Main button */
    .btn-main {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-main:active { transform: scale(0.98); }

    .btn-start {
      background: #9147ff;
      color: #ffffff;
    }

    .btn-stop {
      background: #3a3a44;
      color: #efeff1;
    }

    .btn-main:hover { opacity: 0.88; }

    .api-hint {
      font-size: 10px;
      color: #545459;
      margin-top: 6px;
      line-height: 1.5;
    }

    .api-hint a {
      color: #9147ff;
      text-decoration: none;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }

    .lang-opt {
      background: #1a1a20;
      border: 1px solid #26262c;
      border-radius: 6px;
      color: #adadb8;
      font-size: 12px;
      padding: 6px 8px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: all 0.15s;
    }

    .lang-opt.selected {
      border-color: #9147ff;
      background: #1a0e2e;
      color: #efeff1;
    }

    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-size: 10px;
      color: #3a3a44;
    }

    .error-msg {
      background: #2a0e0e;
      border: 1px solid #5c1a1a;
      border-radius: 6px;
      color: #f87171;
      font-size: 11px;
      padding: 8px 10px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">TwitchSubs</span>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Inactivo</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">API Keys</div>
    <div class="input-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <label class="input-label" for="key-deepgram">Deepgram (transcripción)</label>
      <input type="password" id="key-deepgram" placeholder="dg_xxxxxxxxxxxxxxxx" autocomplete="off" />
      <p class="api-hint">Gratis hasta 200h/mes · <a href="https://console.deepgram.com" target="_blank">Obtener key →</a></p>
    </div>
    <div class="input-row" style="flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:0;">
      <label class="input-label" for="key-deepl">DeepL (traducción, opcional)</label>
      <input type="password" id="key-deepl" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:fx" autocomplete="off" />
      <p class="api-hint">Free API · <a href="https://www.deepl.com/pro-api" target="_blank">Obtener key →</a></p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Idiomas</div>
    <div class="row">
      <span class="row-label">Idioma del streamer</span>
      <select id="source-lang" style="width:120px;">
        <option value="en">🇬🇧 Inglés</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Francés</option>
        <option value="de">🇩🇪 Alemán</option>
        <option value="pt">🇧🇷 Portugués</option>
        <option value="ko">🇰🇷 Coreano</option>
        <option value="ja">🇯🇵 Japonés</option>
      </select>
    </div>
    <div class="row">
      <span class="row-label">Traducir a</span>
      <label class="toggle">
        <input type="checkbox" id="translate-enabled" checked>
        <span class="track"></span>
        <span class="thumb"></span>
      </label>
    </div>
    <div id="target-lang-section">
      <div class="lang-grid" id="lang-grid">
        <button class="lang-opt selected" data-lang="ES">🇪🇸 Español</button>
        <button class="lang-opt" data-lang="EN-GB">🇬🇧 English</button>
        <button class="lang-opt" data-lang="FR">🇫🇷 Français</button>
        <button class="lang-opt" data-lang="DE">🇩🇪 Deutsch</button>
        <button class="lang-opt" data-lang="PT-BR">🇧🇷 Português</button>
        <button class="lang-opt" data-lang="JA">🇯🇵 日本語</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Apariencia</div>
    <div class="row">
      <span class="row-label">Subtítulos visibles</span>
      <label class="toggle">
        <input type="checkbox" id="subs-enabled" checked>
        <span class="track"></span>
        <span class="thumb"></span>
      </label>
    </div>
    <div class="input-row">
      <span class="input-label">Tamaño</span>
      <input type="range" id="font-size" min="12" max="28" value="16" step="1" />
      <span class="range-val" id="font-size-val">16px</span>
    </div>
    <div class="input-row" style="margin-bottom:0;">
      <span class="input-label">Opacidad fondo</span>
      <input type="range" id="bg-opacity" min="0.3" max="1" value="0.82" step="0.05" />
      <span class="range-val" id="bg-opacity-val">82%</span>
    </div>
  </div>

  <div class="section" style="border-bottom:none;">
    <button class="btn-main btn-start" id="btn-toggle">Iniciar subtítulos</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="footer">
    <span class="footer-note">TwitchSubs v1.0 · open source</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
